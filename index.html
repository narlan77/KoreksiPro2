<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koreksi Pro 2 - Scan Lembar Jawaban</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background-color: #f4f7f6; 
            color: #333;
        }
        .container { 
            max-width: 1400px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 25px;
        }
        .upload-section { 
            border: 2px dashed #3498db; 
            padding: 40px 20px; 
            text-align: center; 
            margin-bottom: 25px; 
            background-color: #f9fbfd;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-section:hover {
            background-color: #f0f6fa;
        }
        .table-container { 
            overflow-x: auto; 
            margin-top: 20px; 
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 12px; 
            min-width: 1600px;
        }
        th, td { 
            border: 1px solid #e0e0e0; 
            padding: 10px 6px; 
            text-align: center; 
        }
        th { 
            background-color: #3498db; 
            color: white; 
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        th:nth-child(1), th:nth-child(2), th:nth-child(3) {
            background-color: #2c3e50;
            min-width: 120px;
        }
        tr:nth-child(even) { 
            background-color: #f8f9fa; 
        }
        tr:hover {
            background-color: #f1f3f5;
        }
        .btn-container {
            text-align: right;
            margin-top: 15px;
        }
        .btn { 
            display: inline-block; 
            padding: 10px 20px; 
            background: #2ecc71; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #27ae60;
        }
        .btn-upload {
            background: #3498db;
        }
        .btn-upload:hover {
            background: #2980b9;
        }
        .status {
            font-style: italic;
            color: #7f8c8d;
            margin-top: 10px;
        }
        .answer-cell {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner Lembar Jawaban</h2>
    
    <!-- Bagian Upload / Ambil Foto -->
    <div class="upload-section" id="drop-area">
        <p style="font-size: 16px; margin-bottom: 15px;">Klik tombol di bawah ini untuk mengambil foto atau memilih file scan</p>
        <input type="file" id="fileElem" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
        <button class="btn btn-upload" onclick="document.getElementById('fileElem').click()">Ambil Foto / Pilih Gambar</button>
        <div id="statusOCR" class="status"></div>
    </div>

    <!-- Bagian Preview Tabel -->
    <h3>Preview Data</h3>
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr id="headerRow">
                    <th>Nama Lengkap</th>
                    <th>Nomor Peserta</th>
                    <th>S1</th>
                    <!-- Kolom S2 sampai S45 di-generate otomatis via JS -->
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data baris akan bertambah ke bawah setiap kali sukses scan -->
            </tbody>
        </table>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="exportToExcel()">Unduh File Excel (.xlsx)</button>
    </div>
</div>

<!-- Pustaka pendukung eksternal (Memerlukan koneksi internet saat dijalankan) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    // 1. Generate Header Tabel S2 sampai S45 secara otomatis
    const headerRow = document.getElementById('headerRow');
    for (let i = 2; i <= 45; i++) {
        const th = document.createElement('th');
        th.innerText = `S${i}`;
        headerRow.appendChild(th);
    }

    // 2. Fungsi memproses file gambar yang masuk
    function handleFiles(files) {
        const file = files[0];
        if (!file) return;

        const statusDiv = document.getElementById('statusOCR');
        statusDiv.innerText = "Sedang membaca gambar (OCR)... Mohon tunggu...";

        // Memulai proses OCR membaca teks dari gambar
        Tesseract.recognize(file, 'ind', { logger: m => console.log(m) })
            .then(({ data: { text } }) => {
                statusDiv.innerText = "Selesai memproses! Data berhasil dimasukkan ke tabel.";
                processOCRText(text);
            })
            .catch(err => {
                statusDiv.innerText = "Gagal membaca gambar. Pastikan resolusi cukup jelas.";
                console.error(err);
            });
    }

    // 3. Logika pembersihan dan penataan data ke dalam tabel
    function processOCRText(text) {
        // Ekstrak nomor peserta (cari angka) - ambil 9 karakter terakhir
        const nomorMatch = text.match(/\d+/);
        let nomorPeserta = nomorMatch ? nomorMatch[0] : "000000000";
        nomorPeserta = nomorPeserta.slice(-9); // Ambil 9 karakter terakhir
        
        // Ambil nama lengkap (2 kata pertama)
        const wordsForName = text.replace(/[^a-zA-Z\s]/g, "").trim().split(/\s+/);
        const namaPertama = wordsForName[0] ? wordsForName[0].toUpperCase() : "SISWA";
        const namaKedua = wordsForName[1] ? wordsForName[1].toUpperCase() : "";
        const namaLengkap = namaKedua ? `${namaPertama} ${namaKedua}` : namaPertama;
        
        // HANYA ekstrak huruf A, B, C, D (uppercase) - hanya jawaban yang valid
        const jawaban = text.match(/[ABCDabcd]/g) || [];
        const jawabanValid = jawaban.map(j => j.toUpperCase());
        
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        
        // Kolom 1: Nama Lengkap
        const tdNama = document.createElement('td');
        tdNama.innerText = namaLengkap;
        row.appendChild(tdNama);
        
        // Kolom 2: Nomor Peserta
        const tdNomor = document.createElement('td');
        tdNomor.innerText = nomorPeserta;
        row.appendChild(tdNomor);
        
        // Kolom 3-47: Jawaban S1 sampai S45
        for (let i = 0; i < 45; i++) {
            const td = document.createElement('td');
            td.className = 'answer-cell';
            td.innerText = jawabanValid[i] || "";
            row.appendChild(td);
        }
        
        // Tambahkan baris baru ke dalam tabel utama
        tbody.appendChild(row);
    }

    // 4. Fungsi konversi tabel HTML langsung menjadi File Excel asli
    function exportToExcel() {
        const table = document.getElementById("resultTable");
        const wb = XLSX.utils.table_to_book(table, { sheet: "Data Ujian" });
        XLSX.writeFile(wb, "Hasil_Scan_Siswa.xlsx");
    }
</script>

</body>
</html>
