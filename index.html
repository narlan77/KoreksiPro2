<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scan Lembar Jawaban ke Excel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background-color: #f4f7f6; 
            color: #333;
        }
        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 25px;
        }
        .upload-section { 
            border: 2px dashed #3498db; 
            padding: 40px 20px; 
            text-align: center; 
            margin-bottom: 25px; 
            background-color: #f9fbfd;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-section:hover {
            background-color: #f0f6fa;
        }
        .table-container { 
            overflow-x: auto; 
            margin-top: 20px; 
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
            min-width: 1500px; /* Memastikan kolom tidak terlalu berdempetan */
        }
        th, td { 
            border: 1px solid #e0e0e0; 
            padding: 10px 6px; 
            text-align: center; 
        }
        th { 
            background-color: #3498db; 
            color: white; 
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) { 
            background-color: #f8f9fa; 
        }
        tr:hover {
            background-color: #f1f3f5;
        }
        .btn-container {
            text-align: right;
            margin-top: 15px;
        }
        .btn { 
            display: inline-block; 
            padding: 10px 20px; 
            background: #2ecc71; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #27ae60;
        }
        .btn-upload {
            background: #3498db;
        }
        .btn-upload:hover {
            background: #2980b9;
        }
        .status {
            font-style: italic;
            color: #7f8c8d;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner Lembar Jawaban</h2>
    
    <!-- Bagian Upload / Ambil Foto -->
    <div class="upload-section" id="drop-area">
        <p style="font-size: 16px; margin-bottom: 15px;">Klik tombol di bawah ini untuk mengambil foto atau memilih file scan</p>
        <input type="file" id="fileElem" accept="image/*" style="display:none" onchange="handleFiles(this.files)">
        <button class="btn btn-upload" onclick="document.getElementById('fileElem').click()">Ambil Foto / Pilih Gambar</button>
        <div id="statusOCR" class="status"></div>
    </div>

    <!-- Bagian Preview Tabel -->
    <h3>Preview Data</h3>
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr id="headerRow">
                    <th>Nomor Peserta</th>
                    <th>Nama Siswa</th>
                    <!-- Kolom S1 sampai S45 di-generate otomatis via JS -->
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data baris akan bertambah ke bawah setiap kali sukses scan -->
            </tbody>
        </table>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="exportToExcel()">Unduh File Excel (.xlsx)</button>
    </div>
</div>

<!-- Pustaka pendukung eksternal (Memerlukan koneksi internet saat dijalankan) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    // 1. Generate Header Tabel S1 sampai S45 secara otomatis
    const headerRow = document.getElementById('headerRow');
    for (let i = 1; i <= 45; i++) {
        const th = document.createElement('th');
        th.innerText = `S${i}`;
        headerRow.appendChild(th);
    }

    // 2. Fungsi memproses file gambar yang masuk
    function handleFiles(files) {
        const file = files[0];
        if (!file) return;

        const statusDiv = document.getElementById('statusOCR');
        statusDiv.innerText = "Sedang membaca gambar (OCR)... Mohon tunggu...";

        // Memulai proses OCR membaca teks dari gambar
        Tesseract.recognize(file, 'ind', { logger: m => console.log(m) })
            .then(({ data: { text } }) => {
                statusDiv.innerText = "Selesai memproses! Data berhasil dimasukkan ke tabel.";
                processOCRText(text);
            })
            .catch(err => {
                statusDiv.innerText = "Gagal membaca gambar. Pastikan resolusi cukup jelas.";
                console.error(err);
            });
    }

    // 3. Logika pembersihan dan penataan data ke dalam tabel
    function processOCRText(text) {
        // Bersihkan teks: Hanya sisakan huruf A-Z, a-z, dan spasi (Hapus angka, +, koma, tanda tanya, dll)
        const cleanText = text.replace(/[^a-zA-Z\s]/g, "");
        
        // Memisahkan teks berdasarkan baris atau spasi untuk simulasi input data
        const words = cleanText.trim().split(/\s+/).filter(w => w.length > 0);
        
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        
        // Simulasi ekstraksi identitas (Bisa disesuaikan dengan format kertas ujian Anda)
        const nomorPeserta Dummy = Math.floor(1000 + Math.random() * 9000); 
        const namaSiswaDummy = words.slice(0, 2).join(" ").toUpperCase() || "SISWA BARU";

        // Masukkan Nomor Peserta dan Nama ke kolom utama
        row.innerHTML = `<td>${nomorPesertaDummy}</td><td>${namaSiswaDummy}</td>`;
        
        // Isi Kolom S1 sampai S40 dengan karakter huruf hasil pembersihan
        let wordIndex = 0;
        for (let i = 1; i <= 40; i++) {
            // Ambil karakter huruf dari teks hasil scan secara berurutan
            let charData = "-";
            if(words[wordIndex]) {
                charData = words[wordIndex].charAt(0).toUpperCase();
                wordIndex++;
            } else {
                charData = "A"; // Default fallback jika teks hasil scan habis
            }
            row.innerHTML += `<td>${charData}</td>`;
        }
        
        // Isi Kolom S41 sampai S45 (Wajib Dikosongkan)
        for (let i = 41; i <= 45; i++) {
            row.innerHTML += `<td></td>`;
        }
        
        // Tambahkan baris baru ke dalam tabel utama
        tbody.appendChild(row);
    }

    // 4. Fungsi konversi tabel HTML langsung menjadi File Excel asli
    function exportToExcel() {
        const table = document.getElementById("resultTable");
        const wb = XLSX.utils.table_to_book(table, { sheet: "Data Ujian" });
        XLSX.writeFile(wb, "Hasil_Scan_Siswa.xlsx");
    }
</script>

</body>
</html>
